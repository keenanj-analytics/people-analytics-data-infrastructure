# dbt package dependencies. Run `dbt deps` after editing this file to
# install or refresh.
#
# dbt-utils gives us:
#   - dbt_utils.unique_combination_of_columns       (compound PK tests)
#   - dbt_utils.expression_is_true                  (range / inequality tests)
#   - dbt_utils.accepted_range                      (numeric bounds tests)
#   - dbt_utils.relationships_where                 (FK with predicate)
#   - dbt_utils.equal_rowcount, dbt_utils.equality  (cross-table parity)
# Plus a library of cross-database SQL helpers (date_spine, surrogate_key,
# pivot, deduplicate, etc.) used in the intermediate / marts layers.

packages:
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]
