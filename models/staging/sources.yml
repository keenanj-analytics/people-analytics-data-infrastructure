version: 2

sources:
  - name: raw
    description: |
      Raw source tables loaded as dbt seeds from CSV files generated by the
      synthetic data pipeline (scripts/data_generation/). Lands in BigQuery
      dataset raw_raw via `dbt seed`. Each table represents a single
      source-system export and is treated as immutable input.
    database: just-kaizen-ai
    schema: raw_raw

    tables:
      - name: raw_employees
        description: |
          ADP HRIS export. Combined active + terminated employee census.
          One row per employee per Report_Date snapshot. PK Work_Email.

      - name: raw_performance
        description: |
          Lattice review export. One row per
          (Question_ID x Reviewee_Email x Cycle_Name). Includes manager,
          self, and peer reviews — staging filters to manager + Performance
          Category to produce one official rating per employee per cycle.

      - name: raw_offers_hires
        description: |
          ATS recruiting pipeline. One row per candidate-job combination,
          including hired, declined, and rejected candidates. PK Candidate_ID.

      - name: raw_ees_responses
        description: |
          Engagement survey responses. Anonymized — no link back to the
          employee roster. PK Anonymized_User_ID per question per cycle.

      - name: raw_comp_bands
        description: |
          Compensation band structure. One row per job title with Zone A
          and Zone B salary ranges. Salaries arrive as strings ("$174,000")
          and are parsed in stg_comp_bands. PK Title.

      - name: raw_job_history
        description: |
          Job change events (promotions, transfers, manager changes).
          Currently expected as a separate seed; if the rescale phase opts
          to derive job history from monthly raw_employees snapshots
          instead, drop this entry and the stg_job_history model.
