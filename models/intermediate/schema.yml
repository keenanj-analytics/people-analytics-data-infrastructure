version: 2

models:
  - name: int_employee_tenure
    description: |
      Per-employee tenure and career-velocity calculations. One row per
      employee. Reference date for "current" is var('current_date'),
      defaulting to 2025-03-31 (the synthetic dataset's current
      quarter); for terminated employees the reference date is their
      termination_date so tenure stops at departure.
    columns:
      - name: employee_id
        description: FK to stg_employees. One row per employee. Primary key.
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_employees')
              field: employee_id

      - name: hire_date
        description: Carried forward from stg_employees.
        tests:
          - not_null

      - name: termination_date
        description: |
          Carried forward from stg_employees. Null for active employees.

      - name: reference_date
        description: |
          The date used as "today" in all tenure calculations.
          COALESCE(termination_date, var('current_date')). Always
          populated; always >= hire_date.
        tests:
          - not_null

      - name: tenure_months
        description: |
          Whole months between hire_date and reference_date. Always
          non-negative. Active employees with same-day hires return 0.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: tenure_years
        description: |
          Tenure in years (days / 365.25, rounded to 2 decimals). Always
          non-negative.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: total_promotions
        description: |
          Count of Promotion events in stg_job_history for the employee.
          Includes IC->IC steps and IC->M jumps but NOT Title Change
          rows (which encode the Manager Step-Back's M1->IC4 demotion).
          Zero for employees who have never been promoted.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: last_promotion_date
        description: |
          Effective date of the employee's most recent Promotion event.
          Null for employees who have never been promoted.

      - name: months_since_last_promotion
        description: |
          Whole months from last_promotion_date to reference_date.
          Null for employees who have never been promoted.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                where: "months_since_last_promotion is not null"

      - name: time_in_current_role_months
        description: |
          Whole months from the most recent event of any change_type
          (Hire / Promotion / Lateral Transfer / Title Change /
          Manager Change) to reference_date. Approximates time spent
          in the current role configuration.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: last_manager_change_date
        description: |
          Effective date of the employee's most recent Manager Change
          event. Null for employees who have never had a manager change
          (most employees -- the original at-hire manager remains
          unchanged in raw_job_history when at-hire == current).

      - name: has_manager_change_last_12mo
        description: |
          TRUE when a Manager Change occurred within 12 months prior to
          reference_date. FALSE otherwise. Never null -- employees with
          no Manager Change history return FALSE, not NULL.
        tests:
          - not_null

      - name: career_velocity_per_year
        description: |
          Promotions per tenure-year. Computed as
            total_promotions * 365.25 / tenure_in_days
          rounded to 3 decimals. Returns 0 for same-day hires (avoids
          divide-by-zero). High values (> 0.5) indicate fast career
          progression typical of High-flyer and Founder archetypes.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: int_employee_compensation_current
    description: |
      One row per employee with their most-recent compensation record
      plus the spec's two calculated metrics (compa_ratio and
      band_position). "Most recent" is the row with the latest
      effective_date in stg_compensation; for terminated employees this
      is whatever record was active at termination (Section 12 HR8
      prohibits records after termination_date).
    columns:
      - name: employee_id
        description: FK to stg_employees. One row per employee. Primary key.
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_employees')
              field: employee_id

      - name: current_comp_effective_date
        description: |
          Effective date of the latest comp record for this employee.
          Always >= hire_date and <= reference_date in
          int_employee_tenure.
        tests:
          - not_null

      - name: current_comp_change_reason
        description: |
          The change_reason of the latest comp record. Indicates the
          source of the current salary value (e.g. 'Annual Review',
          'Promotion', 'Market Adjustment', or 'New Hire' for employees
          who have never had a subsequent comp event).
        tests:
          - not_null
          - accepted_values:
              values:
                - New Hire
                - Annual Review
                - Promotion
                - Market Adjustment
                - Equity Adjustment

      - name: salary
        description: |
          Annual base salary in USD as of current_comp_effective_date.
          Always within [comp_band_min, comp_band_max] (Section 12 HR7).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

      - name: comp_band_min
        description: |
          Minimum of the function-specific comp band for the employee's
          (department, sub_department, job_level) at
          current_comp_effective_date.
        tests:
          - not_null

      - name: comp_band_mid
        description: |
          Midpoint of the comp band. Denominator for compa_ratio.
        tests:
          - not_null

      - name: comp_band_max
        description: |
          Maximum of the comp band. Salary is clipped to this ceiling.
        tests:
          - not_null

      - name: compa_ratio
        description: |
          salary / comp_band_mid, rounded to 4 decimals. Typical range
          0.85 to 1.20 since salary is bounded to [band_min, band_max].
          A compa_ratio < 1.00 indicates below-midpoint pay; > 1.00
          above-midpoint. Section 5 archetype rules anchor target
          ranges (e.g. High-flyer 1.05-1.15, Steady contributor
          0.95-1.05, Founder 1.10-1.20).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

      - name: band_position
        description: |
          (salary - comp_band_min) / (comp_band_max - comp_band_min),
          rounded to 4 decimals. Range [0, 1]. 0 = at band minimum,
          0.5 = at midpoint, 1 = at band ceiling. Useful for spotting
          employees compressed against the band ceiling who may need a
          band re-evaluation or promotion to grow further.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

  - name: int_employee_performance_history
    description: |
      Per-cycle performance history with rating_numeric, is_top_performer
      (2-consecutive-cycle definition per data dict), and trend signals
      (cycle_sequence, prior_overall_rating, overall_rating_delta,
      self_optimism_delta). One row per (employee_id, review_cycle).
      Marts that only need the latest row per employee should filter on
      cycle_sequence equal to the per-employee max.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - employee_id
            - review_cycle
    columns:
      - name: employee_id
        description: |
          FK to stg_employees. Not every employee appears here -- 2025-Q1
          hires and very-short-tenure Early Churners have no eligible
          review cycles.
        tests:
          - not_null
          - relationships:
              to: ref('stg_employees')
              field: employee_id

      - name: review_cycle
        description: |
          Cycle identifier in YYYY-HN format. Carried forward from
          stg_performance.
        tests:
          - not_null

      - name: cycle_end_date
        description: |
          Calendar date the cycle's review window closed. Parsed from
          review_cycle. H1 -> July 15 of YYYY; H2 -> January 15 of YYYY+1.
          Used as the ordering key for cycle_sequence and lag windows.
        tests:
          - not_null

      - name: cycle_sequence
        description: |
          1-based ordinal of this cycle within the employee's review
          history. cycle_sequence = 1 is the first eligible cycle for
          the employee.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 1"

      - name: review_completed_date
        description: Carried forward from stg_performance.
        tests:
          - not_null

      - name: review_status
        description: |
          Carried forward from stg_performance. Calculated fields apply
          uniformly across status; marts that exclude Exempt or
          Incomplete should filter at consumption time.
        tests:
          - not_null
          - accepted_values:
              values:
                - Completed
                - Incomplete
                - Exempt

      - name: overall_rating
        description: Carried forward from stg_performance.
        tests:
          - not_null
          - accepted_values:
              values:
                - Significantly Exceeds
                - Exceeds
                - Meets
                - Partially Meets
                - Does Not Meet

      - name: overall_rating_numeric
        description: |
          Numeric mapping of overall_rating per data dict
          (SE=5 / E=4 / M=3 / PM=2 / DNM=1). Used for arithmetic
          aggregation downstream (averages, deltas, trends).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 1 and 5"

      - name: manager_rating
        description: Carried forward from stg_performance.
        tests:
          - not_null

      - name: manager_rating_numeric
        description: Numeric mapping of manager_rating (same scale as overall).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 1 and 5"

      - name: self_rating
        description: |
          Carried forward from stg_performance. Nullable per spec.

      - name: self_rating_numeric
        description: |
          Numeric mapping of self_rating. Null when self_rating is
          null.
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 1 and 5"
              config:
                where: "self_rating_numeric is not null"

      - name: prior_overall_rating
        description: |
          The overall_rating from the immediately previous cycle for
          this employee, ordered by cycle_end_date. Null on
          cycle_sequence = 1.

      - name: prior_overall_rating_numeric
        description: |
          Numeric mapping of prior_overall_rating. Null on
          cycle_sequence = 1.

      - name: overall_rating_delta
        description: |
          overall_rating_numeric minus prior_overall_rating_numeric.
          Range [-4, +4]. Null on cycle_sequence = 1. Positive =
          improving; negative = declining (the canonical signal for
          Performance Managed Out trajectories).
        tests:
          - dbt_utils.expression_is_true:
              expression: "between -4 and 4"
              config:
                where: "overall_rating_delta is not null"

      - name: is_top_performer
        description: |
          Spec calculated field: TRUE when overall_rating IN
          ('Significantly Exceeds', 'Exceeds') for this cycle AND the
          prior cycle (2 consecutive cycles). Always FALSE on
          cycle_sequence = 1 (no prior cycle to compare).
        tests:
          - not_null

      - name: self_optimism_delta
        description: |
          self_rating_numeric minus overall_rating_numeric. Range
          [-4, +4]. Positive = self-rating exceeds calibrated overall
          (typical optimism bias, ~30% of reviews). Null when
          self_rating is null.
        tests:
          - dbt_utils.expression_is_true:
              expression: "between -4 and 4"
              config:
                where: "self_optimism_delta is not null"

  - name: int_employee_event_sequence
    description: |
      Chronologically ordered career-event stream with prev / next event
      metadata per row. Same row count and granularity as
      stg_job_history (~1,045 rows) plus six derived columns:
      event_sequence, total_events_for_employee, is_latest_event,
      prev_event_date / type, next_event_date / type,
      days_since_prev_event, days_until_next_event. Used by marts that
      need time-between calculations (e.g., promotion cadence, time-
      between-manager-changes) and by the latest-event filter
      (is_latest_event = true) for dimension lookups.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - employee_id
            - event_sequence
    columns:
      - name: employee_id
        description: |
          FK to stg_employees. Every employee has at least one row
          (their Hire event); count of rows per employee equals
          total_events_for_employee.
        tests:
          - not_null
          - relationships:
              to: ref('stg_employees')
              field: employee_id

      - name: effective_date
        description: Carried forward from stg_job_history.
        tests:
          - not_null

      - name: change_type
        description: Carried forward from stg_job_history.
        tests:
          - not_null
          - accepted_values:
              values:
                - Hire
                - Promotion
                - Lateral Transfer
                - Department Transfer
                - Title Change
                - Manager Change

      - name: event_sequence
        description: |
          1-based ordinal of this event within the employee's history,
          ordered by (effective_date, change_type). event_sequence = 1
          is always the Hire event.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 1"

      - name: total_events_for_employee
        description: |
          Total number of rows for this employee in this model
          (denormalized; same value across every row that shares
          employee_id). Equal to max(event_sequence) per employee.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 1"

      - name: is_latest_event
        description: |
          TRUE when event_sequence = total_events_for_employee (the
          most recent event for the employee). FALSE otherwise. Useful
          for filtering to current-state lookups without joining back
          to stg_employees.
        tests:
          - not_null

      - name: old_job_level
        description: Carried forward from stg_job_history.

      - name: new_job_level
        description: Carried forward from stg_job_history.
        tests:
          - not_null

      - name: old_department
        description: Carried forward from stg_job_history.

      - name: new_department
        description: Carried forward from stg_job_history.
        tests:
          - not_null

      - name: old_sub_department
        description: Carried forward from stg_job_history.

      - name: new_sub_department
        description: Carried forward from stg_job_history.

      - name: old_job_title
        description: Carried forward from stg_job_history.

      - name: new_job_title
        description: Carried forward from stg_job_history.
        tests:
          - not_null

      - name: old_manager_id
        description: Carried forward from stg_job_history.

      - name: new_manager_id
        description: Carried forward from stg_job_history.

      - name: prev_event_date
        description: |
          effective_date of the immediately preceding event for this
          employee, ordered by event_sequence. Null on event_sequence = 1
          (the Hire row).

      - name: prev_event_type
        description: |
          change_type of the immediately preceding event. Null on
          event_sequence = 1.

      - name: next_event_date
        description: |
          effective_date of the immediately following event for this
          employee. Null on the latest event (is_latest_event = TRUE).

      - name: next_event_type
        description: |
          change_type of the immediately following event. Null on the
          latest event.

      - name: days_since_prev_event
        description: |
          effective_date minus prev_event_date in days. Always >= 0
          when populated (events are chronologically ordered). Null on
          event_sequence = 1.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                where: "days_since_prev_event is not null"

      - name: days_until_next_event
        description: |
          next_event_date minus effective_date in days. Always >= 0 when
          populated. Null on the latest event for an employee.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
              config:
                where: "days_until_next_event is not null"

  - name: int_recruiting_funnel_metrics
    description: |
      One row per requisition with funnel stage counts, the spec's two
      time-to metrics (time_to_fill_days, time_to_offer_days), and five
      stage conversion rates. Source-level slicing belongs in a
      downstream mart; this model stays at requisition grain.
    columns:
      - name: requisition_id
        description: Primary key. One row per recruiting requisition.
        tests:
          - not_null
          - unique

      - name: department
        description: |
          Department the requisition belongs to. Same as the eventual
          hire's at-hire department.
        tests:
          - not_null
          - accepted_values:
              values:
                - Engineering
                - Sales
                - Customer Success
                - Marketing
                - Product
                - G&A
                - People

      - name: sub_department
        description: Sub-department of the requisition.

      - name: job_title
        description: Posted title of the requisition.
        tests:
          - not_null

      - name: recruiter
        description: Assigned recruiter at the time the requisition opened.
        tests:
          - not_null

      - name: hiring_manager
        description: Hiring manager who owns the requisition.
        tests:
          - not_null

      - name: total_applications
        description: |
          Count of applications received for this requisition.
          Includes Hired, Rejected, and Withdrawn rows.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 1"

      - name: reached_phone_screen
        description: |
          Count of applications where phone_screen_date is populated.
          Cumulative -- includes anyone who advanced beyond Phone
          Screen as well.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 1"

      - name: reached_onsite
        description: |
          Count where onsite_date is populated. Cumulative.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 1"

      - name: reached_offer
        description: |
          Count where offer_date is populated. Cumulative.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 1"

      - name: count_hired
        description: |
          Count where current_stage = 'Hired'. Should be exactly 1 per
          requisition in this dataset (one hire per req by construction).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "= 1"

      - name: count_rejected
        description: Count where current_stage = 'Rejected'.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: count_withdrawn
        description: Count where current_stage = 'Withdrawn'.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: first_application_date
        description: Earliest application_date for this requisition.
        tests:
          - not_null

      - name: last_application_date
        description: Latest application_date for this requisition.
        tests:
          - not_null

      - name: hired_application_date
        description: |
          The Hired candidate's own application_date. Anchor for
          time_to_fill / time_to_offer calculations.
        tests:
          - not_null

      - name: hired_phone_screen_date
        description: The Hired candidate's phone_screen_date.
        tests:
          - not_null

      - name: hired_onsite_date
        description: The Hired candidate's onsite_date.
        tests:
          - not_null

      - name: hired_offer_date
        description: The Hired candidate's offer_date.
        tests:
          - not_null

      - name: hire_date
        description: |
          The Hired candidate's hire_date. Matches stg_employees.hire_date
          for the same person (Section 12 HR17).
        tests:
          - not_null

      - name: time_to_fill_days
        description: |
          hire_date minus hired_application_date in days. Per data dict
          definition.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: time_to_offer_days
        description: |
          hired_offer_date minus hired_application_date in days. Per
          data dict definition.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: rate_applied_to_phone
        description: |
          reached_phone_screen / total_applications. Spec target 25%
          (Section 9); actual rate is higher in this dataset because
          the Applied-stage rejection pool is capped during generation.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

      - name: rate_phone_to_onsite
        description: |
          reached_onsite / reached_phone_screen. Combined Phone Screen
          -> Technical -> Onsite rate (Technical not tracked as a
          separate date column). Spec target 0.45 * 0.55 = 0.2475.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

      - name: rate_onsite_to_offer
        description: |
          reached_offer / reached_onsite. Spec target 40% (Section 9).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

      - name: rate_offer_to_hired
        description: |
          count_hired / reached_offer. Spec target 85% (Section 9).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

      - name: rate_overall_conversion
        description: |
          count_hired / total_applications. Spec target 2.1% (Section 9);
          actual is higher due to the Applied-stage cap.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

      - name: top_application_channel
        description: |
          Most-common stg_recruiting.source value across the
          requisition's applications. Ties broken alphabetically.
          Renamed from `source` upstream because BigQuery treats the
          bare `source` identifier as reserved (MERGE INTO ... USING
          source ...) and downstream consumers using SELECT * would
          inherit the parser ambiguity.
        tests:
          - not_null
          - accepted_values:
              values:
                - Referral
                - LinkedIn
                - Job Board
                - Agency
                - Internal
                - Career Page
                - Event

      - name: top_application_channel_count
        description: |
          Count of applications attributed to top_application_channel.
          Always >= 1 (every requisition has at least one application).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 1"

      - name: top_application_channel_share
        description: |
          top_application_channel_count / total_applications. Range [0, 1].
          Higher values mean the requisition's applicant pool was
          concentrated in one channel; lower values mean a more even
          source mix.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

  - name: int_engagement_theme_rollup
    description: |
      The 27 standard engagement questions rolled up to the 8 theme
      level per (survey_cycle, department, sub_department). One row per
      (cycle, dept, sub_dept, theme); compound key in practice is
      (cycle, dept, theme) since sub_department is null on every row in
      the current build (raw_engagement emits dept-level only). Adds
      cycle_end_date for chronological ordering plus prior-cycle and
      delta columns for trend dashboards.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - survey_cycle
            - department
            - theme
    columns:
      - name: survey_cycle
        description: Carried forward from stg_engagement.
        tests:
          - not_null

      - name: cycle_end_date
        description: |
          Calendar date the cycle's quarter closed. Q1 -> Mar 31,
          Q2 -> Jun 30, Q3 -> Sep 30, Q4 -> Dec 31. Used as the
          ordering key for cycle-over-cycle trend windows.
        tests:
          - not_null

      - name: department
        description: Carried forward from stg_engagement.
        tests:
          - not_null
          - accepted_values:
              values:
                - Engineering
                - Sales
                - Customer Success
                - Marketing
                - Product
                - G&A
                - People

      - name: sub_department
        description: |
          Always null in this build. Reserved for forward compatibility
          when the generator emits sub-department rows for sub-depts
          with 5+ respondents.

      - name: theme
        description: One of the 8 spec themes.
        tests:
          - not_null
          - accepted_values:
              values:
                - Employee Engagement
                - Manager Effectiveness
                - Career Growth & Development
                - Work-Life Balance
                - Recognition
                - Company Culture
                - Communication
                - Resources & Enablement

      - name: questions_in_theme
        description: |
          Count of question rows rolled into this theme aggregate.
          Should equal the number of standard questions defined for
          the theme (4 for ENG, 5 for MGE, 3 for the rest).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 3 and 5"

      - name: response_count
        description: |
          Carried forward from stg_engagement. Same value across every
          row in the same (cycle, dept) since the survey is taken once
          per respondent.
        tests:
          - not_null

      - name: theme_avg_score
        description: |
          Mean of avg_score across the questions in this theme.
          Range [1, 5] on the Likert scale.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 1 and 5"

      - name: theme_avg_favorable_pct
        description: |
          Mean of favorable_pct across the questions in this theme.
          Range [0, 1].
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

      - name: enps_score
        description: |
          Carried forward from stg_engagement. Range [-100, 100].
        tests:
          - not_null

      - name: prior_theme_avg_score
        description: |
          theme_avg_score from the immediately preceding cycle for the
          same (department, theme). Null on the first cycle a
          (dept, theme) appears.

      - name: prior_theme_avg_favorable_pct
        description: |
          theme_avg_favorable_pct from the immediately preceding cycle.
          Null on the first appearance.

      - name: theme_score_delta
        description: |
          theme_avg_score - prior_theme_avg_score, rounded to 2
          decimals. Range [-4, 4]. Null on the first cycle.
        tests:
          - dbt_utils.expression_is_true:
              expression: "between -4 and 4"
              config:
                where: "theme_score_delta is not null"

      - name: theme_favorable_pct_delta
        description: |
          theme_avg_favorable_pct - prior_theme_avg_favorable_pct,
          rounded to 4 decimals. Range [-1, 1]. Null on the first cycle.
        tests:
          - dbt_utils.expression_is_true:
              expression: "between -1 and 1"
              config:
                where: "theme_favorable_pct_delta is not null"

  - name: int_employee_dimension
    description: |
      Wide single-row-per-employee dimension combining stg_employees,
      int_employee_tenure, int_employee_compensation_current, and the
      latest row from int_employee_performance_history. Pre-joins these
      so marts can pull employee identity, tenure, current comp, and
      latest review outcome in a single ref() instead of four joins.
      Performance columns are nullable -- not every employee has
      reviews (2025-Q1 hires, very-short-tenure Early Churners).
    columns:
      - name: employee_id
        description: Primary key; one row per employee. FK to stg_employees.
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_employees')
              field: employee_id

      # Identity
      - name: first_name
        tests: [not_null]
      - name: last_name
        tests: [not_null]
      - name: email
        tests:
          - not_null
          - unique

      # Org placement
      - name: department
        tests:
          - not_null
      - name: sub_department
      - name: job_title
        tests:
          - not_null
      - name: job_level
        tests:
          - not_null
      - name: manager_id
        description: |
          Self-FK to int_employee_dimension.employee_id.
          Null only for the CEO.
        tests:
          - relationships:
              to: ref('int_employee_dimension')
              field: employee_id
              config:
                where: "manager_id is not null"

      # Employment timeline
      - name: hire_date
        tests:
          - not_null
      - name: termination_date
      - name: employment_status
        tests:
          - not_null
          - accepted_values:
              values: [Active, Terminated]
      - name: is_active
        description: |
          Convenience boolean derived from employment_status. TRUE when
          employment_status = 'Active'.
        tests:
          - not_null
      - name: termination_type
      - name: termination_reason

      # Demographics
      - name: gender
      - name: race_ethnicity
      - name: location_city
        tests:
          - not_null
      - name: location_state
        tests:
          - not_null
      - name: is_critical_talent
        tests:
          - not_null

      # Tenure (from int_employee_tenure)
      - name: reference_date
        tests:
          - not_null
      - name: tenure_months
        tests:
          - not_null
      - name: tenure_years
        tests:
          - not_null
      - name: total_promotions
        tests:
          - not_null
      - name: last_promotion_date
      - name: months_since_last_promotion
      - name: time_in_current_role_months
        tests:
          - not_null
      - name: last_manager_change_date
      - name: has_manager_change_last_12mo
        tests:
          - not_null
      - name: career_velocity_per_year
        tests:
          - not_null

      # Compensation (from int_employee_compensation_current)
      - name: salary
        tests:
          - not_null
      - name: comp_band_min
        tests:
          - not_null
      - name: comp_band_mid
        tests:
          - not_null
      - name: comp_band_max
        tests:
          - not_null
      - name: compa_ratio
        tests:
          - not_null
      - name: band_position
        tests:
          - not_null
      - name: current_comp_change_reason
        tests:
          - not_null
      - name: current_comp_effective_date
        tests:
          - not_null

      # Latest performance (nullable -- not every employee has reviews)
      - name: latest_review_cycle
        description: |
          Most recent review_cycle for the employee. Null when the
          employee has no reviews (2025-Q1 hires, very-short-tenure
          Early Churners).
      - name: latest_review_cycle_end_date
        description: cycle_end_date of latest_review_cycle. Null if no reviews.
      - name: latest_overall_rating
        description: overall_rating of the most recent review. Null if no reviews.
      - name: latest_overall_rating_numeric
        description: |
          Numeric mapping of latest_overall_rating (SE=5...DNM=1).
          Null if no reviews.
      - name: latest_review_status
        description: review_status of the most recent review. Null if no reviews.
      - name: is_currently_top_performer
        description: |
          is_top_performer flag from the most recent review (TRUE when
          the latest two consecutive cycles are both Exceeds or
          Significantly Exceeds). Null if the employee has fewer than
          two reviews (cycle_sequence < 2 cannot establish the
          consecutive condition); FALSE on cycle_sequence = 1.
